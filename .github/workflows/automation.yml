name: CI
permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  DaaC:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set Git credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 🟢 Step 1: Pull latest .last_file_change_sync so it’s up-to-date
      - name: Ensure latest sync timestamp is available
        run: |
          git pull origin main

      # 🟢 Step 2: Run the sync script
      - name: Detect changed rule files
        env:
          SSH_KEY: ${{secrets.SSH_KEY}}
          USERNAME: ${{secrets.USERNAME}}
          HOST: ${{secrets.SERVER}}

        run: |
          cd ruleset
          chmod +x file_change.sh
          ./file_change.sh

          echo "$SSH_KEY" > /tmp/private_key
          chmod 600 /tmp/private_key

          scp -i /tmp/private_key -o StrictHostKeyChecking=no -r rule_changes $USERNAME@$HOST:/tmp/rule_changes

      # 🟢 Step 3: Commit and push the updated rule_changes and sync file
      - name: Commit and push rule changes
        run: |
          git add ruleset/rule_changes
          git add ruleset/.last_file_change_sync

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update rule_changes and last sync file [skip ci]"
            git push https://x-access-token:${{ secrets.TOKEN }}@github.com/${{ github.repository }} HEAD:main
          fi

      # 🟢 Step 4: SSH and apply the updated rules on the remote server
      - name: Upload and apply changed rule files
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            echo "Copying updated files to Wazuh ruleset..."
            sudo cp -r /tmp/rule_changes/* /var/ossec/ruleset/rules/ || true
            echo "ruleset updated!!!"
            sudo systemctl restart wazuh-manager || true
            echo "wazuh-manager service restarted"