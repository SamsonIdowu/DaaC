name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:


jobs:

  DaaC:
    # The runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
        # Step 1: Checkout repository
        - name: Checkout repository
          uses: actions/checkout@v3
  
        # Step 2: Copy the changed rule file to the SIEM server
        - name: Detect changed rule files
          env:
            SSH_KEY: ${{secrets.SSH_KEY}}
            USERNAME: ${{secrets.USERNAME}}
            HOST: ${{secrets.SERVER}}

          run: |
            ls -l
            ls -l scripts/

            chmod +x /scripts/file_change.sh
            ./scripts/file_change.sh

            echo "$SSH_KEY" > /tmp/private_key
            chmod 600 /tmp/private_key

            scp -i /tmp/private_key -o StrictHostKeyChecking=no -r ruleset/rule_changes $USERNAME@$HOST:/tmp/rule_changes

        # Step 3: Upload and apply the changed rule files
        - name: Upload and apply changed rule files
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.SERVER }}
            username: ${{ secrets.USERNAME }}
            key: ${{ secrets.SSH_KEY }}
            port: ${{ secrets.PORT }}
            script: |
  
              echo "Copying updated files to Wazuh ruleset..."
              sudo cp -r /tmp/rule_changes/* /var/ossec/ruleset/rules/ | true
              echo "ruleset updated!!!"

              sudo systemctl restart wazuh-manager | true
              echo "wazuh-manager service restarted"
