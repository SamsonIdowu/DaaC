name: CI
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  DaaC:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
 
      # Step 2: Detect changed or new files and create archive
      - name: Detect and archive changed rule files
        id: package
        run: |
          mkdir -p changed

          # Try fetching the latest changes from the remote
          git fetch origin

          # Compare against main (or any base branch), fallback to HEAD if necessary
          git diff --name-only origin/main...HEAD | grep '^ruleset/rules/' || true > changed_files.txt

          # Check if there are any changed files
          FILES=$(cat changed_files.txt | wc -l)

          if [ "$FILES" -eq "0" ]; then
            echo "No changed files to process."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Copy changed files into archive dir
          while read file; do
            if [ -f "$file" ]; then
              mkdir -p changed/$(dirname "$file")
              cp "$file" changed/"$file"
            fi
          done < changed_files.txt

          # Archive and encode the changes
          tar czf rules-changed.tar.gz -C changed .
          base64 rules-changed.tar.gz > rules.b64
          echo "skip=false" >> $GITHUB_OUTPUT

      # Step 3: Upload and apply changed rule files
      - name: Upload and apply changed rule files
        if: steps.package.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            echo "Receiving base64 archive from GitHub runner..."
            cat <<'EOF' > /tmp/rules.b64
            $(cat rules.b64)
            EOF

            echo "Decoding and extracting archive..."
            base64 -d /tmp/rules.b64 > /tmp/rules-changed.tar.gz
            mkdir -p /tmp/rules-changed
            tar xzf /tmp/rules-changed.tar.gz -C /tmp/rules-changed

            echo "Copying updated files to Wazuh ruleset..."
            echo '${{ secrets.PASSWORD }}' | sudo -S cp -r /tmp/rules-changed/* /var/ossec/ruleset/rules/

            echo "Restarting wazuh-manager..."
            echo '${{ secrets.PASSWORD }}' | sudo -S systemctl restart wazuh-manager

            echo "Cleaning up..."
            rm -rf /tmp/rules-changed /tmp/rules-changed.tar.gz /tmp/rules.b64