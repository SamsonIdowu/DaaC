name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  DaaC:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # <-- ensures we get at least 2 commits for comparison

      - name: Set up SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/private_key
          chmod 600 /tmp/private_key

      - name: Detect modified or new rule files
        run: |
          mkdir -p interim_rules

          # Get list of added or modified files in ruleset/rules/
          git diff --name-status HEAD^ HEAD | grep -E '^(A|M)\s+ruleset/rules/' | cut -f2 | while read file; do
            if [ -f "$file" ]; then
              mkdir -p "interim_rules/$(dirname "$file" | sed 's|ruleset/rules/||')"
              cp "$file" "interim_rules/$(echo "$file" | sed 's|ruleset/rules/||')"
            fi
          done

          echo "Interim files:"
          find interim_rules

      - name: SCP changed files to SIEM server
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          USERNAME: ${{ secrets.USERNAME }}
          HOST: ${{ secrets.SERVER }}
        run: |
          scp -i /tmp/private_key -o StrictHostKeyChecking=no -r interim_rules/* $USERNAME@$HOST:/tmp/interim_rules

      - name: Upload and apply changed rule files
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            echo "Copying updated files to Wazuh ruleset..."
            sudo cp -r /tmp/interim_rules/* /var/ossec/ruleset/rules/ || true
            echo "ruleset updated!!!"
            sudo systemctl restart wazuh-manager || true
            echo "wazuh-manager service restarted"