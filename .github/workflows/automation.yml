name: CI
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  DaaC:
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    steps:
        # Step 1: Checkout repository
        - name: Checkout repository
          uses: actions/checkout@v3
  
        # Step 2: Detect and create an archive of changed files
        - name: Detect changed rule files
          env:
            SSH_KEY: ${{secrets.SSH_KEY}}
            USERNAME: ${{secrets.USERNAME}}
            HOST: ${{secrets.SERVER}}

          run: |
            echo "$SSH_KEY" > /tmp/private_key
            chmod 600 /tmp/private_key

            scp -i /tmp/private_key -o StrictHostKeyChecking=no -r ruleset/rules $USERNAME@$HOST:/tmp/rules
        # Step 3: Upload and apply changed rule files
        - name: Upload and apply changed rule files
          uses: appleboy/ssh-action@v1.0.0
          with:
            host: ${{ secrets.SERVER }}
            username: ${{ secrets.USERNAME }}
            key: ${{ secrets.SSH_KEY }}
            port: ${{ secrets.PORT }}
            script: |
  
              echo "Copying updated files to Wazuh ruleset..."
              sudo cp -r /tmp/rules/* /var/ossec/ruleset/rules/ | true
              echo "ruleset updated!!!"

              sudo systemctl restart wazuh-manager | true
              echo "wazuh-manager service restarted"